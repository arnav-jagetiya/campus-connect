spring:
  application:
    name: campus-connect

  # Default profile for local development.
  # Override in production with SPRING_PROFILES_ACTIVE=prod
  profiles:
    active: dev

  # JPA / Hibernate
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration

# Server
server:
  port: 8080

# Application-specific configuration
app:
  jwt:
    secret: ${APP_JWT_SECRET:}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
